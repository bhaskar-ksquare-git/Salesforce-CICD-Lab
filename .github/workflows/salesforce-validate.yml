name: Salesforce Validation

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: |
          npm install @salesforce/cli --global
          sf --version

      - name: Validate Project Structure
        run: |
          ls -la
          ls -la force-app

      - name: Display Project Info
        run: |
          sf project list