
name: Salesforce Enterprise CI/CD 
on:
  # ── PR-based trigger ──────────────────────────────────
  pull_request:
    branches:
      - main
      - develop
      - "release/**"
    paths:
      - "force-app/**"
      - "manifest/**"
      - "config/**"

  # ── Manual trigger ────────────────────────────────────
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment to deploy to"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
      run_security_scans:
        description: "Run all security scans?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      deploy_after_validation:
        description: "Deploy if all checks pass?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

# CONCURRENCY — cancel in-flight runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# GLOBAL ENVIRONMENT VARIABLES
env:
  SF_CLI_VERSION: "latest"
  JAVA_VERSION: "17"
  NODE_VERSION: "18"
  PMD_VERSION: "6.55.0"
  SONAR_PROJECT_KEY: "your-org_your-repo"   # ← update: <sonarcloud-org>_<repo-name>
  SONAR_ORGANIZATION: "your-sonarcloud-org"  # ← update: your SonarCloud org slug
  DEPLOY_TARGET: ${{ github.event.inputs.target_environment || 'dev' }}

# ----------------------------------------------------------
# PERMISSIONS — required for CodeQL and SARIF uploads
# ----------------------------------------------------------
permissions:
  actions: read
  contents: read
  security-events: write   # needed to upload SARIF to Security tab
  pull-requests: write     # needed to post PR comments

# ==============================================================
# SECRETS — Add all of these in:
# GitHub Repo → Settings → Secrets and variables → Actions

# ── Salesforce Dev Sandbox ──────────────────────────────────
# SALESFORCE_DEV_INSTANCE_URL   → https://test.salesforce.com
#                                  (or your MyDomain sandbox URL)
# SALESFORCE_DEV_CLIENT_ID      → Consumer Key from Connected App
# SALESFORCE_DEV_JWT_KEY        → base64-encoded server.key
#                                  Run: base64 -w 0 server.key
# SALESFORCE_DEV_USERNAME       → CI deployment username
#                                  e.g. deploy@yourcompany.dev
#
# ── SonarCloud (free at sonarcloud.io) ──────────────────────
# SONAR_TOKEN                   → User token from
#                                  sonarcloud.io → My Account
#                                  → Security → Generate Token
#
# ── OWASP (optional, speeds up NVD CVE downloads) ───────────
# OWASP_NVD_API_KEY             → Free key from
#                                  nvd.nist.gov/developers/
#                                  /request-an-api-key
#
# ── CodeQL ──────────────────────────────────────────────────
# No secrets needed — CodeQL is fully built into GitHub Actions

jobs:
  
  # STAGE 1 — VALIDATE SALESFORCE METADATA
  validate-metadata:
    name: "Stage 1 · Validate Salesforce Metadata"
    runs-on: ubuntu-latest
    outputs:
      has_apex: ${{ steps.detect.outputs.has_apex }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Salesforce CLI
        run: |
          npm install --global @salesforce/cli@${{ env.SF_CLI_VERSION }}
          sf version

      - name: Install SFDX Git Delta plugin
        run: echo 'y' | sf plugins install sfdx-git-delta

      - name: Authenticate to Dev Sandbox (JWT — no password needed)
        env:
          SF_JWT_KEY: ${{ secrets.SALESFORCE_DEV_JWT_KEY }}
        run: |
          echo "$SF_JWT_KEY" | base64 --decode > /tmp/server.key
          sf org login jwt \
            --client-id     "${{ secrets.SALESFORCE_DEV_CLIENT_ID }}" \
            --jwt-key-file  /tmp/server.key \
            --username      "${{ secrets.SALESFORCE_DEV_USERNAME }}" \
            --instance-url  "${{ secrets.SALESFORCE_DEV_INSTANCE_URL }}" \
            --alias         dev-sandbox \
            --set-default
          rm -f /tmp/server.key   # never leave private key on disk

      - name: Generate delta package (PR only)
        id: delta
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            mkdir -p .sf/delta
            sf sgd source delta \
              --to   HEAD \
              --from "${{ github.event.pull_request.base.sha }}" \
              --repo . \
              --output .sf/delta \
              --generate-delta
          fi

      - name: Detect Apex / LWC changes
        id: detect
        run: |
          if find force-app -name "*.cls" -o -name "*.trigger" 2>/dev/null | grep -q .; then
            echo "has_apex=true" >> $GITHUB_OUTPUT
          else
            echo "has_apex=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate metadata against Dev Sandbox (check-only deploy + run tests)
        run: |
          if [ -f ".sf/delta/package/package.xml" ]; then
            echo "→ Validating delta package"
            sf project deploy validate \
              --manifest      .sf/delta/package/package.xml \
              --target-org    dev-sandbox \
              --test-level    RunLocalTests \
              --coverage-formatters json-summary \
              --results-dir   ./test-results \
              --wait          60
          else
            echo "→ Validating full source"
            sf project deploy validate \
              --source-dir    force-app \
              --target-org    dev-sandbox \
              --test-level    RunLocalTests \
              --coverage-formatters json-summary \
              --results-dir   ./test-results \
              --wait          60
          fi

      - name: Upload test & coverage results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: ./test-results/
          retention-days: 30

  # STAGE 2 — PMD APEX STATIC ANALYSIS
  # Runs on GitHub runner — no server needed
  
  pmd-analysis:
    name: "Stage 2 · PMD Apex Static Analysis"
    runs-on: ubuntu-latest
    needs: validate-metadata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache PMD binary
        uses: actions/cache@v4
        with:
          path: ~/.pmd
          key: pmd-${{ env.PMD_VERSION }}

      - name: Download PMD
        run: |
          if [ ! -d ~/.pmd/pmd-bin-${{ env.PMD_VERSION }} ]; then
            mkdir -p ~/.pmd
            curl -sSL \
              "https://github.com/pmd/pmd/releases/download/pmd_releases%2F${{ env.PMD_VERSION }}/pmd-dist-${{ env.PMD_VERSION }}-bin.zip" \
              -o ~/.pmd/pmd.zip
            unzip -q ~/.pmd/pmd.zip -d ~/.pmd
          fi
          echo "PMD_HOME=$HOME/.pmd/pmd-bin-${{ env.PMD_VERSION }}" >> $GITHUB_ENV

      - name: Run PMD — all Apex rulesets
        run: |
          $PMD_HOME/bin/pmd check \
            --dir            force-app \
            --rulesets       "category/apex/bestpractices.xml,\
                              category/apex/codestyle.xml,\
                              category/apex/design.xml,\
                              category/apex/errorprone.xml,\
                              category/apex/performance.xml,\
                              category/apex/security.xml" \
            --format         xml \
            --report-file    pmd-report.xml \
            --minimum-priority 3 || true

      - name: Run PMD — generate SARIF for Security tab
        run: |
          $PMD_HOME/bin/pmd check \
            --dir            force-app \
            --rulesets       "category/apex/security.xml,category/apex/errorprone.xml" \
            --format         sarif \
            --report-file    pmd-results.sarif || true

      - name: Upload PMD SARIF → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: pmd-results.sarif
          category: pmd-apex

      - name: Upload PMD XML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: pmd-report.xml
          retention-days: 30

      - name: Fail pipeline on Critical / High PMD violations
        run: |
          CRITICAL=$(grep -c 'priority="1"\|priority="2"' pmd-report.xml 2>/dev/null || echo 0)
          echo "Critical PMD violations found: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::PMD found $CRITICAL critical/high violations. Fix before merging."
            exit 1
          fi

  # STAGE 3 — SALESFORCE CODE ANALYZER (SF Scanner)

  sf-scanner:
    name: "Stage 3 · Salesforce Code Analyzer"
    runs-on: ubuntu-latest
    needs: validate-metadata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install Salesforce CLI + Scanner plugin
        run: |
          npm install --global @salesforce/cli@${{ env.SF_CLI_VERSION }}
          echo 'y' | sf plugins install @salesforce/sfdx-scanner

      - name: Run SF Scanner — DFA (data-flow / SOQL injection / XSS)
        run: |
          sf scanner run dfa \
            --target         "force-app/**/*.cls" \
            --projectdir     "force-app" \
            --format         sarif \
            --outfile        sf-scanner-dfa.sarif \
            --severity-threshold 3 || true

      - name: Run SF Scanner — Graph engine (ESLint + PMD + RetireJS)
        run: |
          sf scanner run \
            --target         "force-app" \
            --engine         "retire-js,eslint,pmd" \
            --format         sarif \
            --outfile        sf-scanner-graph.sarif \
            --severity-threshold 3 || true

      - name: Upload SF Scanner DFA → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: sf-scanner-dfa.sarif
          category: sf-scanner-dfa

      - name: Upload SF Scanner artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sf-scanner-reports
          path: |
            sf-scanner-dfa.sarif
            sf-scanner-graph.sarif
          retention-days: 30

  # STAGE 4 — SONARCLOUD CODE QUALITY GATE
  # Sign up free at: https://sonarcloud.io
  sonarcloud:
    name: "Stage 4 · SonarCloud Code Quality Gate"
    runs-on: ubuntu-latest
    needs: [pmd-analysis, sf-scanner]

    steps:
      - name: Checkout repository (full history for blame data)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download test coverage results
        uses: actions/download-artifact@v4
        with:
          name: validation-results
          path: ./test-results

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # built-in, no setup needed
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.sources=force-app
            -Dsonar.apex.coverage.reportPaths=test-results/coverage/coverage-summary.json
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
            -Dsonar.scm.provider=git

      # SonarCloud posts Quality Gate result directly on the PR as a comment

  # ════════════════════════════════════════════════════════
  # STAGE 5 — OWASP DEPENDENCY CHECK
  owasp-dependency-check:
    name: "Stage 5 · OWASP Dependency Check"
    runs-on: ubuntu-latest
    needs: validate-metadata

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        with:
          project:  "salesforce-enterprise"
          path:     "."
          format:   "ALL"
          out:      "./owasp-reports"
          args: >
            --failOnCVSS 7
            --enableRetired
            --enableExperimental
            --nvdApiKey ${{ secrets.OWASP_NVD_API_KEY }}
            --exclude "**/.git/**"
            --exclude "**/node_modules/**"

      - name: Upload OWASP SARIF → GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ./owasp-reports/dependency-check-report.sarif
          category: owasp-dependency-check

      - name: Upload OWASP full reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: ./owasp-reports/
          retention-days: 30

  # STAGE 6 — CODEQL SAST (replaces Checkmarx)
  # Results appear in: Security → Code scanning alerts
  codeql-sast:
    name: "Stage 6 · CodeQL SAST Scan"
    runs-on: ubuntu-latest
    needs: [pmd-analysis, sf-scanner]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          # javascript covers LWC / Aura JS components
          # python covers any tooling/scripts in the repo
          languages: javascript, python
          queries: security-extended, security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: codeql-sast
          output: codeql-results
          upload: always

      - name: Upload CodeQL results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-results
          path: codeql-results/
          retention-days: 30

  # STAGE 7 — DEPLOY TO DEV SANDBOX
  # Triggers on:
  #   • PR merge into main / develop
  #   • Manual run with deploy_after_validation = true
  deploy-dev:
    name: "Stage 7 · Deploy → Dev Sandbox"
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: ${{ secrets.SALESFORCE_DEV_INSTANCE_URL }}
    needs:
      - sonarcloud
      - owasp-dependency-check
      - codeql-sast

    if: |
      (github.event_name == 'pull_request' &&
       github.event.action == 'closed' &&
       github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.deploy_after_validation == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Salesforce CLI + Git Delta plugin
        run: |
          npm install --global @salesforce/cli@${{ env.SF_CLI_VERSION }}
          echo 'y' | sf plugins install sfdx-git-delta

      - name: Authenticate to Dev Sandbox (JWT)
        env:
          SF_JWT_KEY: ${{ secrets.SALESFORCE_DEV_JWT_KEY }}
        run: |
          echo "$SF_JWT_KEY" | base64 --decode > /tmp/server.key
          sf org login jwt \
            --client-id     "${{ secrets.SALESFORCE_DEV_CLIENT_ID }}" \
            --jwt-key-file  /tmp/server.key \
            --username      "${{ secrets.SALESFORCE_DEV_USERNAME }}" \
            --instance-url  "${{ secrets.SALESFORCE_DEV_INSTANCE_URL }}" \
            --alias         dev-sandbox \
            --set-default
          rm -f /tmp/server.key

      - name: Generate delta package
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            mkdir -p .sf/delta
            sf sgd source delta \
              --to   HEAD \
              --from "${{ github.event.pull_request.base.sha }}" \
              --repo . \
              --output .sf/delta \
              --generate-delta
          fi

      - name: Deploy to Dev Sandbox
        run: |
          if [ -f ".sf/delta/package/package.xml" ]; then
            echo "→ Deploying delta package"
            sf project deploy start \
              --manifest      .sf/delta/package/package.xml \
              --target-org    dev-sandbox \
              --test-level    RunLocalTests \
              --coverage-formatters json-summary \
              --results-dir   ./deploy-results \
              --wait          60
          else
            echo "→ Deploying full source"
            sf project deploy start \
              --source-dir    force-app \
              --target-org    dev-sandbox \
              --test-level    RunLocalTests \
              --coverage-formatters json-summary \
              --results-dir   ./deploy-results \
              --wait          60
          fi

      - name: Upload deployment results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-results-dev
          path: ./deploy-results/
          retention-days: 30

      - name: Post deployment summary comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body: [
                '## ✅ Deployment to Dev Sandbox — Successful',
                '',
                `**Commit:** \`${{ github.sha }}\``,
                `**Branch:** \`${{ github.head_ref }}\``,
                `**Deployed at:** ${new Date().toISOString()}`,
                '',
                '| Gate | Result |',
                '|------|--------|',
                '| PMD Apex Analysis    | ✅ Passed |',
                '| Salesforce Scanner   | ✅ Passed |',
                '| SonarCloud Quality   | ✅ Passed |',
                '| OWASP Dep Check      | ✅ Passed |',
                '| CodeQL SAST          | ✅ Passed |',
              ].join('\n')
            });

  
  # STAGE 8 — PIPELINE SUMMARY (always runs)
  pipeline-summary:
    name: "Stage 8 · Pipeline Summary"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate-metadata
      - pmd-analysis
      - sf-scanner
      - sonarcloud
      - owasp-dependency-check
      - codeql-sast
      - deploy-dev

    steps:
      - name: Write summary to GitHub Actions dashboard
        run: |
          echo "## 🚀 Salesforce Enterprise CI/CD — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| # | Stage | Tool | Serverless? | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|-------|------|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 1 | Validate Metadata  | Salesforce CLI      | ✅ Yes | ${{ needs.validate-metadata.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 2 | PMD Analysis       | PMD (GitHub runner) | ✅ Yes | ${{ needs.pmd-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 3 | SF Scanner         | SF CLI Plugin       | ✅ Yes | ${{ needs.sf-scanner.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 4 | Code Quality Gate  | SonarCloud SaaS     | ✅ Yes | ${{ needs.sonarcloud.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 5 | OWASP Dep Check    | GitHub runner       | ✅ Yes | ${{ needs.owasp-dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 6 | SAST Scan          | CodeQL (GitHub)     | ✅ Yes | ${{ needs.codeql-sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 7 | Deploy → Dev       | Salesforce CLI      | ✅ Yes | ${{ needs.deploy-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Triggered by **${{ github.actor }}** · ref: \`${{ github.ref }}\` · sha: \`${{ github.sha }}\`_" >> $GITHUB_STEP_SUMMARY
